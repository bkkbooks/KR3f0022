body:
  text: 中星譜胡亶撰晝四十二刻十二分夜五十三刻三分雨水正月中晝四十二刻十分夜五十三刻五分日入酉初一刻五分昏酉正三刻十一分日出卯正二刻十分旦卯初初刻四分驚蟄二月節晝四十五刻五分夜五十刻十分日入酉初二刻十分昏戌初初刻十四分日出卯正一刻五分旦寅正三刻一分春分二月中晝四十八刻夜四十八刻日入酉正初刻昏戌初二刻五分日出卯正初刻旦寅正一刻十分清明三月節晝五十刻十分夜四十五刻五分日入酉正一刻五分昏戌初三刻十三分日出卯初二刻十分旦寅正初刻二分穀雨三月中晝五十三刻三分夜四十二刻十二分日入酉正二刻九分昏戌正一刻七分日出卯初一刻六分旦寅初二刻八分立夏四月節晝五十五刻九分夜四十刻六分日入酉正三刻十二分昏戌正三刻二分日出卯初初刻三分旦寅初初刻十三分小滿四月中晝五十七刻九分夜三十八刻六分日入戌初初刻十二分昏亥初初刻十二分日出寅正三刻三分旦丑正三刻三分芒種五月節晝五十八刻十四分夜三十七刻一分日入戌初一刻七分昏亥初一刻十二分日出寅正二刻八分旦丑正二刻三分夏至五月中晝五十九刻七分夜三十六刻八分日入戌初一刻十一分昏亥初二刻五分日出寅正二刻四分旦丑正一刻十分小暑六月節晝五十八刻十四分夜三十七刻一分日入戌初一刻七分昏亥初一刻十二分日出寅正二刻八分旦丑正二刻三分大暑六月中晝五十七刻九分夜三十八刻六分日入戌初初刻十二分昏亥初初刻十二分日出寅正三刻三分旦丑正三刻三分立秋七月節晝五十五刻九分夜四十刻六分日入酉正三刻十二分昏戌正三刻二分日出卯初初刻三分旦寅初初刻十三分處暑七月中晝五十三刻三分夜四十二刻十二分日入酉正二刻九分昏戌正一刻七分日出卯初一刻六分旦寅初二刻八分白露八月節晝五十刻十分夜四十五刻五分日入酉正一刻五分昏戌初三刻十三分日出卯初二刻十分旦寅正初刻二分秋分八月中晝四十八刻夜四十八刻日入酉正初刻昏戌初二刻五分日出卯正初刻旦寅正一刻十分寒露九月節晝四十五刻五分夜五十刻十分日入酉初二刻十分昏戌初初刻十四分日出卯正一刻五分旦寅正三刻一分霜降九月中晝四十二刻十分夜五十三刻五分日入酉初一刻五分昏酉正三刻十一分日出卯正二刻十分旦卯初初刻四分立冬十月節晝四十刻六分夜五十五刻九分日入酉初初刻三分昏酉正二刻十分日出卯正三刻十二分旦卯初一刻五分小雪十月中晝三十八刻六分夜五十七刻九分日入申正三刻三分昏酉正一刻十三分日出辰初初刻十二分旦卯初二刻二分大雪十一月節晝三十七刻一分夜五十八刻十四分日入申正二刻八分昏酉正一刻五分日出辰初一刻七分旦卯初二刻十分冬至十一月中晝三十六刻八分夜五十九刻七分日入申正二刻四分昏酉正一刻二分日出辰初一刻十一分旦卯初二刻十三分小寒十二月節晝三十七刻一分夜五十八刻十四分日入申正二刻八分昏酉正一刻五分日出辰初一刻七分旦卯初二刻十分大寒十二月中晝三十八刻六分夜五十七刻九分日入申正三刻三分昏酉正一刻十三分日出辰初初刻十二分旦卯初二刻二分大星經緯度分右十二宫者經度也赤道南北者緯度也俱以平度三百六十度每度百分計算説見星圖發凡此係戊辰嵗監局測定距今四十年經度約應東移半度強緯度亦應稍有所移苐圖譜所據者赤道而星之東移乃循黃道須憑儀器方可測確記此以備考驗昏旦中宿度分右分注首行京師宿度也次行附記浙省宿度也俱以日度三百六十五度四分度之一每度百分計算按各節氣所厯中宿度分多寡懸殊此緣日出入遲早及昏旦參差所生天運自然但以仰觀不忒為密合不可強齊也數有竒零厯家約分二名不及度者謂之弱過度者謂之強或以過度分三名過未及半曰少過半曰太適半曰半皆約略之辭也少字俱去聲星圖發凡一圖內近紫微垣之圈常見界圈也距北極三十六度次大腰圈赤道圈也距北極九十度距常見圈五十四度又大腰圈斜絡赤道者黃道圈也半在赤道外相距最逺處二十三度半強半在赤道內相距最逺處亦二十三度半強次邉大圈常隱界圈也北距赤道五十四度南距南極亦三十六度繞南極諸星既屬常隱不見又赤道向南極與向北極同理形勢皆宜漸狹而入平面之圖不能不漸濶故愈南愈不可圖止及與常見圈對待之五十四度而止常見常隱度數就中州言之亦係厯代相沿舊法蓋北極出地各處不同如順天出地四十度常見亦四十度浙省出地三十度常見亦三十度南極入地理同一古法分周天為三百六十五度四分度之一蓋依太陽右旋行天一周為三百六十五日四分日之一是為一嵗故即以日行之度為天度也苐拘此數則以分象分宫測太隂測五星處處皆有竒零紛糅難算况四分日之一自古迄今分數漸減又非定論乎新法簡捷周天止畫三百六十度名曰平度仍存古法名曰日度一切起算皆用平度若欲兼考日度者以乘除法通之一算即得今遵而兩用之其記二十八宿度分用日度三百六十五度二十五分列於內圍其記十二宫次度分用平度三百六十度列於外圍二法會通算法附載於後握算即可互知一圖內分二十八經線直線為經者二十八宿之距線也十二宫次亦應有十二經線慮涉繁雜止於各圈際用短界線識之亦自可明一天體渾圎經度三百六十緯度亦三百六十如經度有五度四分度之一即緯度亦須有之故知平度為簡今將緯線橫線為緯凡圍圈皆緯也寄畫井宿經線之上以便稽考此緯線近北較數向南較疏者緣入圖南面經度漸濶不得不小疏其緯以應之不然即撱形成扁不相肖似矣在天度實係平均非有疏數也一常見圈內有十字線子午卯酉線也一本法經度從春分戌宫初度起自一度右旋以至三百六十度為亥宫之末今每宫各注一十二十三十度理亦同也一緯度俱從赤道起算向北自一十二十以至九十即本圖中心向南自一十二十以至五十四即常隱界圈一欲考各星經度分用長界尺長線亦可從圖心引貫本星中央視界尺末端切某宫度分即本星之經度分欲考緯度分亦如前法用長尺或線從心引抵本星中央視本星離赤道或南或北若干分寸識之即用所識之分寸為度移向緯線依南北量之即本星緯度分一圖內恆星有古志有而今無者如器府天籥之屬有古志多而今少者如羽林積卒之屬厯指稱據今實測如此然測星時或遇夜氣有明暗應俟更加詳驗內有星不分明仍存聯線者亦備查補之意一恆星有古志無而新增者厯指稱經緯分明不得不為附益今亦不能悉載止載四等以上大星凡圖內無名并無聯線者是也間亦有并載小星者如女宿東南二星天乳北星之屬查别圖有作正者并存以備考一各星悉依圖表惟八魁九星撿晉隋二志及步天歌宋靈臺祕苑位置實當在此厯指以為不類譯從火鳥名色今寧從舊又南門西星厯指譯入馬尾而以赤道南五十九度在常隱界內之星作南門查五十九度中土所不能見何緣厯代志之亦為釐正自餘即小有較訂皆據古今厯圖不敢憑臆進退毫末一古志以列宿分四象所謂東方蒼龍七宿之類蓋昔賢所定先天方位也天行不息每日必有適當方位之一刻瞬息即移求其昏時如方位者一嵗止有一夕次日即移一度按堯典日中星鳥以殷仲春是其時矣朱鳥既在南蒼龍必在東白虎必在西元武必在北也昔賢似據此定之今時則星鳥以季春昏中其象設不變而時令浸移故尊其説為先天方位可也實則東南西北刻刻運旋在某星左即為東在某星右即為西而主北辰為言則常見界外衆星皆可謂之南也一本圖名總圖者以别南北兩分圖也按分圖一以北極為心一以南極為心皆以赤道為邉界在總圖赤道以內諸星與北圖形體無異若赤道以外諸星則宜狹反廣不如南圖之合天象也今另繪周天經緯度二小圖又將南圖尾箕斗相連三宿形模并繪於後以明其意然跨赤道各星在分圖剖開為二頗煩比擬總圖則聯屬無間蓋二法各有所宜也一本圖分宫分宿俱依赤道為主蓋所考者恆星與七政循赤道西行度分以審其中也與時憲七政躔度厯過宫移宿不能皆同蓋七政厯依黃道為主所考者七政循黃道東行度分故也赤道宫次從赤極即本圖中心出經線黃道宫次從黃極距赤極二十三度半強出經線惟二至同一線二分惟交處同線本末亦異其餘宫次悉參差非一欲因此知彼須用句股算法并從黃道圖察之一天左旋即西行日月五星右旋即東行從來厯家定説自晉虞喜覺有嵗差而厯術漸密然嵗差緣於恆星東行則實自時憲厯指發之足擴前賢之己悟而未備也苐厯家舊説皆云天無體即以恆星為天左旋之體今恆星既有東行則孰為主左旋者曰此在恆星天之表非人瞻矚所及厯指名之曰宗動天宋儒云從太虛空裏觀那天理亦符也一圖內恆星約三百座總計一千一百五十七星內第一大者十四星第二五十一星第三一百八十四星第四三百九十三星第五二百二十二星第六二百九十三星外又新增無名一百二十六星大星在羣星中光燦不同晚先見晨後隱語云落落如晨星大抵一二三等星也一天度廣逺難以道里數計苐就人目而論如兩星相距一度在圖鱗接者仰視在天相離亦不盈尺古法以月與五星行近恆星七寸以內始名曰犯亦謂同在一度之內故也此指周天均度言其經度與緯度同理不主分宫分宿中間廣而兩端鋭之度也一以上各説止從本圖及中星譜所及者述其大略圖譜之外為説尚繁不遑縷述附平度日度會通算法如先有平度分欲知日度分以日度三百六十五度二十五分為實以平度三百六十度為法除之得日度一度一分四十五秒八十三微零準平度一度凡遇各宫宿之平度分以一一四五八三乘之即得日度分如先有日度分欲知平度分以平度三百六十度為實以日度三百六十五度二十五分為法除之得平度九十八分五十六秒二十六微零準日度一度凡遇各宫宿之日度分以九八五六二六乘之即得平度分其理同也如新法度下之分秒微等遞以六十計即須先將分秒微等數俱通六為十次併入度下總乘之渾球不可圖於平面故剖為二以圖之朱子云天如圓匣赤道是圓匣合縫處是矣圖雖有二應作一渾圖觀斯經緯曉然也中星譜
