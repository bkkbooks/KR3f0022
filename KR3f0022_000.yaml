body:
  text: 中星譜天文算法類一推步之屬提要臣等謹案中星譜一卷國朝胡亶撰亶號勵齋仁和人王晫今世説稱其博綜羣書尤精天官家言日月薄蝕星辰躔度推測毫髪無遺在長安與監中西洋専家反覆辨論羣皆嘆伏所著有中星譜周天現界圖歩天歌行世今所見者惟是編所訂經星凡四十有五乃於二十八舍之外益以大角貫索天市帝座織女河鼔天津北落師門土司空天囷五車参左肩参右足天狼南北河軒轅大星太㣲帝座等十八星用以較午中遲早綴諸時刻首京師附浙江其餘以類而推所論晝夜永短寒暑循環地殊勢異與所引經𫝊記載考定嵗差釐分昏旦皆簡明詳切與今儀象考成中星更録頗能表裏觀其自序撰自康熙八年是此書在欽定算書以前前明徐光啟新法算書以後存其度數以備校証恒星嵗差之行亦不為無所禆矣乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀中星譜原序易曰仰以觀於天文俯以察於地理是二者固皆儒者讀書窮理之所有事也顧地理似易而較難天文似難而較易蓋地之延袤既非轍迹所能周亦非瞻望所可悉按圖志以求索所見與所傳聞多殊何從一一證之故曰難也歩天則不然當夕仰觀則地平以上半周天之星悉燦然在目矣向晨再一仰觀則平地以下半周天之星又悉旋轉於上燦然在目矣其間即有近日之星光揜未能全見晝永之夜見星不滿天周然遲旬月而更一再起視則日右旋而星左出曩所不見者又無不燦然在目矣故曰易也惟是星數本繁學有造始亶以為莫要於先審中星中星者恒星之見於正南午位者也其指肇自堯典所謂星鳥星火星虛星昴各以昏時測其正中以定二分二至此古聖人敬授民時之宏規也三代因以加詳如詩稱定之方中作於楚宫七月流火九月授衣春秋傳云龍見而雩水昏正而栽火中成軍之屬皆壹以候星為考時出政之本其重如此逮月令一書顯於周秦之間以十二月别昏旦中星敘次尤晰論者謂雖出吕覽周公之遺書故載之禮經良有以也漢唐至今厯術加密皆附節氣以記中星載在史志可考然節氣古與今同中星今與古異如堯時冬至昏昴中今時冬至昏壁中四千年之間己移五十餘度其故云何蓋緣恒星與七政各有東西二行其隨赤道而西也大約晝夜一周其隨黃道而東也各有遲速不等惟恒星之東行最遲閲七十年方漸移一度即厯家所云歲差也既有歲差則中星當非一定然一歲之差纔周天三萬六千分平度三百六十每度百分之一分有半弱則數十年之内暌離非遠且即中星以驗知歲差因歲差以修改中星易簡之理也亶素好覽厯代史中天官厯志等書後據時憲厯書粗窺大畧顧自慚謭陋無能有所發揮今幸䝉恩予養閒居稍暇竊不自揆爰就成書中酌其簡要易曉者釐為中星譜一卷其目於凡例詳之又取舊本星宿小圖展為大圖經緯度數備具圖譜互稽庶幾中星一覽無遺矣既識中星因按圖以推左右上下諸星即周天無一不可漸識既識周星可以審時候可以定方隅可以察分野可以測知五緯行留順逆及日躔月離之所在因以悟天行之不息感時序之如馳兢兢焉各有進徳修業之思無玩嵗愒日之志其亦有小補矣乎况識星實為治厯根本朝廷方旁求諳曉厯法之人是譜也雖不足以就正博雅抑亦可為始學津逮云爾皇清康熈八年正月仁和後學胡亶謹撰中星譜發凡一晝夜循環無刻不有中星晝則太陽光盛星不可見故不備錄今以日入至日出為限通夜中星依次順列較古法止記昏旦者為詳若欲並知晝時中星苐檢隔半年後對待節氣譜内於各星下時刻數其相衝時刻即半年前節氣之晝時星中也所以然者半年後節氣之夜與半年前節氣之晝長短數同此正星囘於天適半周之候故也假如欲知立春晝星檢對待之立秋譜内視心宿在酉正三刻三分中卯酉為衝即知立春心宿在卯正三刻三分中也室宿在丑初二刻七分中丑未為衝即知立春室宿在未初二刻七分中也餘星倣此雨水檢處暑之類亦倣此一月令以十二月記中星月之氣朔不齊法難分畫故註家皆主其月中氣為説今既錄中氣兼錄節氣共為二十四譜亦漢唐以來舊術一古法以日入後二刻半為昏所謂初昏也以日出前二刻半為旦所謂平旦也今時憲新法以太陽在地平下十八度定為昏旦時刻但此十八度内太陽升降有正有斜故各省各節之定昏定旦時刻小異然刻數大約倍於初昏平旦者於時星體全見經緯較明故也若欲知古旦昏時刻苐於譜内日入時刻加二刻六分日出時刻減二刻六分即得蓋古法百刻之二刻五十分即今九十六刻之二刻又十五分刻之六故也一古法每日百刻每刻百分授時厯所謂日法一萬者也但以百刻配十二時無法可均如俗傳子午各多二刻或云子午卯酉各多一刻皆非厯家所用考授時元厯大統明厯所用者每一時凡八大刻二小刻其前四大刻曰初初曰初一曰初二曰初三俱各百分間以一小刻曰初四止一十六分六十六秒不盡其後四大刻曰正初曰正一曰正二曰正三俱各百分再間以一小刻曰正四亦止一十六分六十六秒不盡合十二時總為九十六大刻二十四小刻其小刻以六準一故名百刻共足萬分之數雖為傳習有據民間頗似難知宋人有以大刻為各六十分小刻為各一十分者又古語云每時八刻零三分刻之一其理並同今時憲斯法每時止整八刻初初初一初二初三正初正一正二正三刪去二小刻總共九十六刻較為簡㨗易曉蓋刻數雖省而時不異譬有匹帛於此以小尺量得四丈大尺量為三丈六尺其於匹帛無加損也一古法每刻百分者時憲止用每刻十五分蓋計時至刻巳近矣刻下之分簡則易考也若運算則不嫌遞以百計以便乗除所謂並行不悖也若欲據新法刻分考知古法刻分自有㑹通算法先除後乘即自可知一古法中星止記二十八宿内如井斗度廣候之不免移時今於列宿外增益十七大星共為四十五座大星庶接續易明凡此大星各有經緯度分另於譜後備錄用以按圖比對若合符節其餘衆星皆有中時譜雖不著可以類推一大星四十五座皆係近黃赤道者每座星數多寡不等譜内止拈各座之一星為言如增益十七座明書某大星某南星之類是也其二十八宿專指距星如角宿以南星為距亢宿以南第二星為距之類按圖檢之凡距星皆有經線為界并横書宿名於其端甚易識别一星宿出入地平皆有定時但各省各節刻數不同惟正中之時刻無二亦如日出日入各處時刻不同惟日中皆為午正初刻也一中星既云正南午位如五車天津織女等星實在人頂之北葢以北極視之不嫌為南也一譜内所錄中星時刻皆指其節氣中氣之第一日也若次日則星行天一周而又西逾約一度即須於本星時刻内減十五分刻之四弱以驗其中從此遞日減之以至次節如立春首日胃宿酉初初刻十三分中若第二日須減四分為酉初初刻九分中第三日再減四分為五分中餘星倣此一日出入及昏旦晝夜長短各省計時大同較刻小異今譜前所列者一依時憲所頒順天府時刻尊京師也他省時刻具在厯前可檢故不復贅惟末附記浙省以備參考一各節氣昏旦時刻不必適遇星中今考其距宿之幾度幾分中附錄於大星經緯度分後以合古法而驗同異第大星經緯係錄平度距宿度分係錄日度其説見星圖發凡中一星宿西行經一晝夜九十六刻每刻十五分共一千四百四十分行天一周按譜内係用平度計周天三萬六千分三百六十度每度百分每刻之一分行天之二十五分每一刻行三百七十五分即三度七十五分每一時行三千分即三十度如用日度計周天三萬六千五百二十五分三百六十五度四分度之一每度百分每刻之一分行天之二十五分三十六秒四十五微零每分百秒每秒百微每一刻行三百八十分四十六秒八十七微零每一時行三千四十三分三十七秒四十二微零此與前述節氣次日遞減四分皆是論其大較其間尚小有加減别書詳之然要自大體不遠也
